<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Cheppu — Speak Telugu</title>
<meta name="description" content="Learn to speak Telugu confidently — listen, understand, build sentences, and say it out loud. No reading or writing required." />
<meta name="theme-color" content="#F4A81D" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icons/favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Baloo+Tammudu+2:wght@500;600;700&family=Mukta:wght@400;500;600;700&display=swap');

  :root{
    --paper:#FFFBF3; --paper-2:#FDF3E2; --card:#FFFFFF;
    --ink:#241B33; --ink-soft:#7A7186;
    --marigold:#F4A81D; --marigold-deep:#D6890A;
    --vermilion:#E14B3B; --teal:#0E8C72; --teal-deep:#0A6E59; --indigo:#4B3D9E;
    --line:rgba(36,27,51,.10); --shadow:0 10px 30px rgba(36,27,51,.10); --r:22px;
    --tel:"Baloo Tammudu 2","Noto Sans Telugu","Gautami",sans-serif;
    --disp:"Baloo 2",ui-rounded,system-ui,sans-serif;
    --body:"Mukta",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased;
    background:radial-gradient(1200px 500px at 50% -200px,#FFF3DC 0%,transparent 60%),var(--paper);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  :focus-visible{outline:3px solid var(--indigo);outline-offset:2px;border-radius:8px}

  #shell{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
    position:relative;background:var(--paper);box-shadow:0 0 0 1px var(--line)}
  @media(min-width:620px){#shell{margin:22px auto;border-radius:34px;overflow:hidden;
    min-height:calc(100vh - 44px);box-shadow:var(--shadow),0 0 0 1px var(--line)}}

  .topbar{display:flex;align-items:center;gap:14px;padding:16px 18px 12px;position:sticky;top:0;z-index:5;
    background:linear-gradient(var(--paper),rgba(255,251,243,.92));backdrop-filter:blur(6px)}
  .stat{display:flex;align-items:center;gap:6px;font-weight:700;font-size:15px}
  .stat .ic{font-size:18px;line-height:1}
  .stat.fire{color:var(--vermilion)} .stat.xp{color:var(--marigold-deep)} .stat.gem{color:var(--indigo)}
  .brandmark{font-family:var(--disp);font-weight:800;font-size:20px;display:flex;align-items:center;gap:8px;margin-right:auto}
  .brandmark b{font-family:var(--tel);color:var(--marigold-deep);font-weight:700}

  main{flex:1;padding:6px 18px 96px;overflow:auto}

  .hero{text-align:center;padding:14px 8px 4px}
  .hero .big{font-family:var(--tel);font-size:60px;line-height:1;color:var(--marigold);font-weight:700;text-shadow:0 6px 0 rgba(244,168,29,.18)}
  .hero h1{font-family:var(--disp);font-weight:800;margin:8px 0 2px;font-size:23px}
  .hero p{color:var(--ink-soft);margin:0;font-size:14.5px;font-weight:600}

  /* daily goal + review banner */
  .dailywrap{display:flex;gap:12px;margin:18px 2px 4px}
  .goalcard{flex:1;display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);
    border-radius:18px;padding:14px;box-shadow:var(--shadow)}
  .ring{width:54px;height:54px;flex:none}
  .goalcard .gt{font-family:var(--disp);font-weight:800;font-size:15px;line-height:1.1}
  .goalcard .gs{color:var(--ink-soft);font-weight:700;font-size:12.5px;margin-top:2px}
  .reviewcard{display:flex;align-items:center;gap:12px;width:100%;background:linear-gradient(135deg,#fff,#FDF3E2);
    border:2px solid var(--line);border-bottom-width:4px;border-radius:18px;padding:14px;box-shadow:var(--shadow);margin:12px 2px 0;text-align:left}
  .reviewcard .ri{font-size:30px;flex:none}
  .reviewcard .rt{font-family:var(--disp);font-weight:800;font-size:16px}
  .reviewcard .rs{color:var(--ink-soft);font-weight:700;font-size:12.5px;margin-top:1px}
  .reviewcard .rb{margin-left:auto;background:var(--marigold);color:#fff;font-family:var(--disp);font-weight:800;
    font-size:13px;padding:9px 14px;border-radius:12px;box-shadow:0 3px 0 var(--marigold-deep)}
  .reviewcard.locked{opacity:.55;filter:saturate(.4)}

  .unit{margin-top:24px}
  .unit-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--r);color:#fff;box-shadow:var(--shadow)}
  .unit-head .n{font-family:var(--disp);font-weight:800;font-size:12px;opacity:.85;letter-spacing:1.5px;text-transform:uppercase}
  .unit-head h2{font-family:var(--disp);margin:2px 0 0;font-size:18px;font-weight:800}
  .unit-head .tel{font-family:var(--tel);font-size:26px;margin-left:auto;font-weight:700;opacity:.95}

  .path{position:relative;padding:18px 0 6px;display:flex;flex-direction:column;align-items:center}
  .node-row{display:flex;justify-content:center;width:100%;margin:14px 0}
  .l1{transform:translateX(-60px)} .r1{transform:translateX(60px)}
  .l2{transform:translateX(-32px)} .r2{transform:translateX(32px)}
  .node{width:76px;height:68px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;
    font-family:var(--disp);font-weight:800;font-size:25px;color:#fff;box-shadow:0 7px 0 rgba(0,0,0,.18),var(--shadow);transition:transform .08s}
  .node:active{transform:translateY(3px);box-shadow:0 4px 0 rgba(0,0,0,.18)}
  .node.locked{background:#E7DECF;color:#B9AE99;box-shadow:0 7px 0 #d6cab2;cursor:not-allowed}
  .node.locked:active{transform:none}
  .node.done::after{content:"✓";position:absolute;top:-6px;right:-6px;background:var(--teal);color:#fff;width:26px;height:26px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid var(--paper)}
  .node .lbl{position:absolute;bottom:-26px;font-weight:700;font-size:12.5px;color:var(--ink-soft);white-space:nowrap;text-align:center}
  .node .crowns{position:absolute;bottom:-42px;font-size:11px;color:var(--marigold-deep);font-weight:800;letter-spacing:1px;white-space:nowrap}
  .node.cur::before{content:"START";position:absolute;top:-33px;background:#fff;color:var(--teal-deep);font-family:var(--disp);
    font-weight:800;font-size:11px;padding:5px 11px;border-radius:12px;box-shadow:var(--shadow);animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  .lesson-top{display:flex;align-items:center;gap:14px;padding:14px 18px 6px}
  .close{font-size:26px;color:var(--ink-soft);font-weight:700;line-height:1}
  .pbar{flex:1;height:14px;background:#EBE2D2;border-radius:99px;overflow:hidden}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),#27b894);border-radius:99px;transition:width .35s}
  .lhearts{color:var(--vermilion);font-weight:800;font-size:16px}
  .combo{position:absolute;top:52px;right:18px;background:var(--marigold);color:#fff;font-family:var(--disp);font-weight:800;
    font-size:12px;padding:4px 10px;border-radius:99px;box-shadow:0 3px 0 var(--marigold-deep);animation:pop .25s}
  @keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}

  .q{padding:18px 20px 10px}
  .q .prompt{font-family:var(--disp);font-weight:800;font-size:20px;margin:0 0 16px}
  .q .prompt em{color:var(--indigo);font-style:normal}
  .wordcard{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:24px 18px;text-align:center;box-shadow:var(--shadow);position:relative}
  .wordcard .roman{font-size:32px;line-height:1.2;color:var(--ink);font-weight:700;letter-spacing:.3px}
  .wordcard .tel{font-family:var(--tel);font-size:22px;margin-top:6px;color:var(--ink-soft);font-weight:600}
  .wordcard .en{margin-top:8px;color:var(--ink-soft);font-weight:700}
  .speaker{width:42px;height:42px;border-radius:14px;background:var(--marigold);color:#fff;font-size:20px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 var(--marigold-deep)}
  .speaker:active{transform:translateY(2px);box-shadow:0 2px 0 var(--marigold-deep)}
  .speaker.tr{position:absolute;top:14px;right:14px}
  .speaker.big{width:90px;height:90px;border-radius:28px;font-size:40px;margin:4px auto 0;box-shadow:0 6px 0 var(--marigold-deep)}
  .speaker.slow{width:46px;height:34px;border-radius:11px;font-size:14px;font-weight:800;font-family:var(--disp);background:#EBE2D2;color:var(--ink-soft);box-shadow:0 3px 0 #d6cab2;display:inline-flex;gap:3px}

  .options{display:grid;gap:12px;margin-top:18px}
  .opt{background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:16px;padding:15px 16px;
    text-align:left;font-weight:700;font-size:17px;color:var(--ink);transition:transform .06s;display:flex;flex-direction:column;gap:2px}
  .opt .sub{color:var(--ink-soft);font-size:13px;font-weight:600}
  .opt:active{transform:scale(.99)}
  .opt.sel{border-color:var(--indigo);background:#F1EFFB}
  .opt.right{border-color:var(--teal);background:#E6F6F1;color:var(--teal-deep)}
  .opt.wrong{border-color:var(--vermilion);background:#FCEBE8;color:var(--vermilion)}

  /* build (word tiles) */
  .answerbox{min-height:62px;border-bottom:2px dashed var(--line);margin:6px 0 4px;padding:8px 2px 14px;
    display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start}
  .answerbox.empty::before{content:"Tap the words in order";color:#c8bda8;font-weight:700;font-size:14px;align-self:center;margin:auto}
  .bank{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px;justify-content:center}
  .tile{background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:13px;
    padding:11px 15px;font-weight:800;font-size:17px;color:var(--ink);transition:transform .06s}
  .tile:active{transform:translateY(2px)}
  .tile.used{opacity:0;pointer-events:none}
  .tile.placed{background:#F1EFFB;border-color:var(--indigo)}
  .tile.lock{pointer-events:none}

  /* match */
  .matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .mcell{background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;
    padding:16px 12px;font-weight:800;font-size:16px;min-height:58px;display:flex;align-items:center;justify-content:center;text-align:center;transition:transform .06s}
  .mcell.tel{font-family:var(--body)}
  .mcell:active{transform:scale(.98)}
  .mcell.sel{border-color:var(--indigo);background:#F1EFFB}
  .mcell.gone{opacity:0;pointer-events:none;transition:opacity .25s}
  .mcell.bad{border-color:var(--vermilion);background:#FCEBE8;animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  /* speak */
  .recbtn{background:var(--vermilion);color:#fff;font-family:var(--disp);font-weight:800;font-size:15px;
    padding:13px 22px;border-radius:14px;box-shadow:0 4px 0 #b73122;transition:transform .08s}
  .recbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #b73122}
  .recbtn.live{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 4px 0 #b73122,0 0 0 0 rgba(225,75,59,.4)}50%{box-shadow:0 4px 0 #b73122,0 0 0 14px rgba(225,75,59,0)}}
  .playrow{display:flex;gap:10px;justify-content:center;margin-top:14px}
  .cmp{background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:13px;
    padding:11px 18px;font-weight:800;font-size:15px;color:var(--ink);transition:transform .06s}
  .cmp:active{transform:translateY(2px)}
  .cmp.mine{border-color:var(--indigo);background:#F1EFFB;color:var(--indigo)}
  .heard{text-align:center;font-weight:700;color:var(--ink-soft);margin-top:10px;font-size:14px;min-height:18px}
  .heard b{font-family:var(--tel);color:var(--ink)}

  .speak-help{text-align:center;color:var(--ink-soft);font-weight:600;margin-top:16px;font-size:14.5px}
  .skiprow{text-align:center;margin-top:14px}
  .skiprow button{color:var(--ink-soft);font-weight:700;text-decoration:underline;font-size:13.5px}

  .footer-pad{height:8px}
  .feedback{position:sticky;bottom:0;padding:16px 18px calc(16px + env(safe-area-inset-bottom));background:var(--paper);border-top:1px solid var(--line)}
  .feedback.ok{background:#E6F6F1} .feedback.no{background:#FCEBE8}
  .fmsg{display:flex;flex-direction:column;gap:2px;font-family:var(--disp);font-weight:800;font-size:18px;margin-bottom:12px}
  .feedback.ok .fmsg{color:var(--teal-deep)} .feedback.no .fmsg{color:var(--vermilion)}
  .fmsg .ans{font-family:var(--body);font-weight:700;font-size:13.5px;color:var(--ink-soft)}
  .btn{width:100%;padding:16px;border-radius:16px;font-family:var(--disp);font-weight:800;font-size:17px;color:#fff;
    background:var(--teal);box-shadow:0 5px 0 var(--teal-deep);letter-spacing:.3px;text-transform:uppercase}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--teal-deep)}
  .btn.marigold{background:var(--marigold);box-shadow:0 5px 0 var(--marigold-deep)}
  .btn.red{background:var(--vermilion);box-shadow:0 5px 0 #b73122}
  .btn.ghost{background:#EBE2D2;color:var(--ink);box-shadow:0 5px 0 #d6cab2}
  .btn[disabled]{opacity:.45;box-shadow:none;pointer-events:none}

  .center-screen{padding:40px 22px;text-align:center}
  .center-screen .emoji{font-size:66px}
  .center-screen h2{font-family:var(--disp);font-weight:800;font-size:27px;margin:10px 0 4px}
  .center-screen p{color:var(--ink-soft);font-weight:600;margin:0 0 22px}
  .pills{display:flex;gap:12px;justify-content:center;margin:18px 0 26px;flex-wrap:wrap}
  .pill{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:14px 16px;min-width:90px;box-shadow:var(--shadow)}
  .pill .k{font-family:var(--disp);font-weight:800;font-size:23px}
  .pill .v{color:var(--ink-soft);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .pill.xp .k{color:var(--marigold-deep)} .pill.acc .k{color:var(--teal-deep)} .pill.crown .k{color:var(--indigo)}
  .crownrow{display:flex;gap:6px;justify-content:center;font-size:24px;margin:-8px 0 22px}
  .crownrow span{filter:grayscale(1);opacity:.35} .crownrow span.on{filter:none;opacity:1}

  .ph-head{font-family:var(--disp);font-weight:800;font-size:23px;margin:16px 2px 4px}
  .ph-sub{color:var(--ink-soft);font-weight:600;margin:0 2px 14px;font-size:14px}
  .searchbar{display:flex;align-items:center;gap:8px;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:10px 14px;margin:0 2px 12px}
  .searchbar input{flex:1;border:none;background:none;font-size:15px;font-weight:600;outline:none}
  .ph-unit{font-family:var(--disp);font-weight:800;font-size:12.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--indigo);margin:22px 2px 8px}
  .ph-item{display:flex;align-items:center;gap:14px;background:var(--card);border:2px solid var(--line);border-radius:16px;
    padding:12px 14px;margin-bottom:10px;box-shadow:0 4px 14px rgba(36,27,51,.05)}
  .ph-item .play{width:40px;height:40px;flex:none;border-radius:13px;background:var(--marigold);color:#fff;font-size:18px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 var(--marigold-deep)}
  .ph-item .play:active{transform:translateY(2px);box-shadow:0 1px 0 var(--marigold-deep)}
  .ph-item .txt .rm{font-weight:700;font-size:16px;line-height:1.25}
  .ph-item .txt .tel{font-family:var(--tel);font-size:16px;color:var(--ink-soft);font-weight:600}
  .ph-item .en{margin-left:auto;text-align:right;font-weight:700;font-size:13.5px;max-width:42%;color:var(--ink-soft)}
  .strength{display:inline-block;width:7px;height:7px;border-radius:50%;background:#E7DECF;margin-left:3px}
  .strength.on{background:var(--teal)}

  /* chat */
  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 150px)}
  .scenario{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 12px;margin-bottom:4px}
  .scenario button{flex:none;border:2px solid var(--line);background:var(--card);border-radius:99px;padding:8px 14px;font-weight:700;font-size:13px;color:var(--ink-soft)}
  .scenario button.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}
  .msgs{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px;padding:6px 2px}
  .bubble{max-width:84%;padding:11px 14px;border-radius:18px;font-weight:600;font-size:15px;line-height:1.45}
  .bubble.me{align-self:flex-end;background:var(--indigo);color:#fff;border-bottom-right-radius:5px}
  .bubble.them{align-self:flex-start;background:var(--card);border:2px solid var(--line);border-bottom-left-radius:5px}
  .bubble.them .play{display:inline-flex;width:26px;height:26px;border-radius:8px;background:var(--marigold);color:#fff;
    align-items:center;justify-content:center;font-size:13px;margin-left:6px;vertical-align:middle}
  .bubble.sys{align-self:center;background:#FDF3E2;color:var(--ink-soft);font-size:13px;text-align:center;border-radius:14px}
  .composer{display:flex;gap:8px;padding:10px 2px calc(6px + env(safe-area-inset-bottom));align-items:flex-end}
  .composer input{flex:1;border:2px solid var(--line);border-radius:16px;padding:13px 14px;font-size:15px;font-weight:600;background:var(--card)}
  .composer .micbtn{width:50px;height:50px;flex:none;border-radius:16px;background:var(--vermilion);color:#fff;font-size:19px;box-shadow:0 4px 0 #b73122}
  .composer .micbtn.live{animation:pulse 1s infinite}
  .composer .send{width:50px;height:50px;flex:none;border-radius:16px;background:var(--teal);color:#fff;font-size:20px;box-shadow:0 4px 0 var(--teal-deep)}
  .composer .send:active{transform:translateY(2px);box-shadow:0 2px 0 var(--teal-deep)}

  .prof-card{background:var(--card);border:2px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-top:8px}
  .prof-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);font-weight:700;gap:12px}
  .prof-row:last-child{border-bottom:none}
  .prof-row .v{font-family:var(--disp);font-weight:800}
  .toggle{width:50px;height:28px;border-radius:99px;background:#EBE2D2;position:relative;transition:background .2s;flex:none}
  .toggle.on{background:var(--teal)}
  .toggle i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .toggle.on i{left:25px}
  .stepper{display:flex;align-items:center;gap:10px}
  .stepper button{width:30px;height:30px;border-radius:9px;background:#EBE2D2;font-weight:800;font-size:18px;color:var(--ink)}
  .keyfield{display:flex;gap:8px;margin-top:8px}
  .keyfield input{flex:1;border:2px solid var(--line);border-radius:12px;padding:11px 12px;font-size:14px;font-weight:600;background:var(--card)}
  .keyfield button{background:var(--indigo);color:#fff;border-radius:12px;padding:0 16px;font-weight:800}
  .note{font-size:13px;color:var(--ink-soft);line-height:1.65;font-weight:500;margin-top:14px}
  .note a{color:var(--indigo);font-weight:700}
  .linkbtn{color:var(--vermilion);font-weight:800;text-decoration:underline;font-size:14px;margin-top:14px;display:inline-block}
  .achgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px}
  .ach{aspect-ratio:1;border-radius:16px;background:var(--card);border:2px solid var(--line);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;padding:6px;text-align:center}
  .ach .ai{font-size:26px;filter:grayscale(1);opacity:.35}
  .ach.on{background:#FFF7E6;border-color:var(--marigold)}
  .ach.on .ai{filter:none;opacity:1}
  .ach .at{font-size:9.5px;font-weight:800;color:var(--ink-soft);line-height:1.1}

  nav{position:sticky;bottom:0;display:flex;background:var(--card);border-top:1px solid var(--line);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:6}
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--ink-soft);font-weight:700;font-size:11px}
  nav button .ic{font-size:21px} nav button.on{color:var(--marigold-deep)}

const mem = {};

let teVoice=null;
function pickVoice(){ const vs=window.speechSynthesis?speechSynthesis.getVoices():[];
  teVoice = vs.find(v=>/te[-_]IN/i.test(v.lang)) || vs.find(v=>/telugu/i.test(v.name)) || null; }

  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(te);

let actx=null;
function tone(freq,dur,t0,type,gain){ if(!actx)return; const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||"sine"; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
  const t=actx.currentTime+t0; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain||.18,t+.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+.02); }
function sfx(kind){
  if(!S.sound) return;
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended")actx.resume(); }catch(e){ return; }
  if(kind==="right"){ tone(660,.12,0,"triangle"); tone(990,.16,.09,"triangle"); }
  else if(kind==="wrong"){ tone(200,.2,0,"sawtooth",.14); tone(150,.22,.08,"sawtooth",.12); }
  else if(kind==="tap"){ tone(520,.05,0,"sine",.08); }
  else if(kind==="win"){ [523,659,784,1047].forEach((f,i)=>tone(f,.18,i*.1,"triangle",.16)); }
  else if(kind==="ach"){ [784,988,1319].forEach((f,i)=>tone(f,.2,i*.09,"sine",.16)); }
}

/* ---------- 4b. SPACED REPETITION ---------- */
const SRS_DAYS=[0,1,3,7,16,45];
function srsUpdate(rm,ok){
  S.seen[rm]=true;
  const cur=S.srs[rm]||{s:0,due:0};
  const s=ok?Math.min(5,cur.s+1):Math.max(0,cur.s-1);
  S.srs[rm]={s, due:Date.now()+SRS_DAYS[s]*864e5};
}
function dueItems(){
  const now=Date.now(), un=unlocked();
  const pool=LESSONS.filter((l,i)=>i<=un).flatMap(l=>l.items);
  return pool.filter(it=>{ const r=S.srs[it.rm]; return r && r.due<=now; })
             .sort((a,b)=>(S.srs[a.rm].due)-(S.srs[b.rm].due));
}

/* ---------- 5. LESSON ENGINE ---------- */
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
const others=(it,n,pool)=>shuffle((pool||ALL).filter(x=>x.rm!==it.rm)).slice(0,n);
const recog = window.SpeechRecognition||window.webkitSpeechRecognition||null;

function buildQueue(items, opts){
  opts=opts||{}; const its=items, q=[];
  if(its.length>=3){ // recognition warm-up
    const four=shuffle(its).slice(0,Math.min(4,its.length));
    q.push({type:"match", items:four});
  }
  const mids=[];
  its.forEach((it,i)=>{
    if(wc(it)>=2){
      mids.push(i%2===0 ? {type:"build", it, answer:it.rm.split(/\s+/)} : {type:"hearbuild", it, answer:it.rm.split(/\s+/)});
    } else {
      mids.push(i%2===0 ? {type:"listen", it, options:shuffle([it.en,...others(it,3).map(x=>x.en)])}
                        : {type:"recall", it, options:shuffle([it,...others(it,3)])});
    }
    if(i%3===1) mids.push({type:"listen", it, options:shuffle([it.en,...others(it,3).map(x=>x.en)])});
  });
  shuffle(mids).forEach(m=>q.push(m));
  const sayables=its.filter(x=>wc(x)>=2);
  (sayables.length?sayables:its).slice(0,opts.speakCount||3).forEach(it=>q.push({type:"speak", it}));
  return q;
}
function startLesson(id){
  const lesson=LESSONS.find(l=>l.id===id);
  const queue=buildQueue(lesson.items);
  S.lesson={lesson, queue, total:queue.length, done:0, miss:0, hearts:5, sel:null, checked:false, correct:false,
    combo:0, bestCombo:0, level:(S.crowns[id]||0), review:false};
  S.screen="lesson"; render();
}
function startReview(){
  const items=dueItems().slice(0,8); if(!items.length) return;
  const queue=buildQueue(items,{speakCount:2});
  S.lesson={lesson:{id:"__review", name:"Practice", unit:{title:"Review",color:"#D6890A",accent:"#a36800"}},
    queue, total:queue.length, done:0, miss:0, hearts:5, sel:null, checked:false, correct:false,
    combo:0, bestCombo:0, level:0, review:true};
  S.screen="lesson"; render();
}
function grade(ok,it){
  const L=S.lesson; L.checked=true; L.correct=ok;
  if(ok){ L.done++; L.combo++; L.bestCombo=Math.max(L.bestCombo,L.combo); sfx("right"); buzz(20); }
  else { L.hearts--; L.miss++; L.combo=0; sfx("wrong"); buzz([40,40,40]); }
  if(it) srsUpdate(it.rm, ok);
  render();
}
function nextQ(){ const L=S.lesson;
  if(L.hearts<=0){ S.screen="fail"; render(); return; }
  if(L.correct) L.queue.shift(); else { const f=L.queue.shift(); L.queue.push(resetExercise(f)); }
  L.checked=false; L.sel=null;
  if(L.queue.length===0){ completeLesson(); return; }
  render();
}
function resetExercise(q){ delete q.tiles; delete q.built; delete q.mstate;
  if(q.recUrl){ try{ URL.revokeObjectURL(q.recUrl); }catch(e){} } delete q.recUrl; delete q._rec; delete q._recErr; return q; }
function completeLesson(){
  const L=S.lesson;
  if(L.review){
    const earned=10; L.earned=earned; addXp(earned); bumpStreak(); checkAch(); saveProgress();
    sfx("win"); buzz([30,60,30]); S.screen="complete"; render(); return;
  }
  const id=L.lesson.id, first=!S.crowns[id];
  const prevCrown=S.crowns[id]||0;
  S.crowns[id]=Math.min(5,prevCrown+1);
  L.crownNow=S.crowns[id]; L.crownPrev=prevCrown;
  L.earned = first?15:(prevCrown<5?10:5);
  addXp(L.earned); bumpStreak(); checkAch(); saveProgress();
  sfx("win"); buzz([30,60,30]); S.screen="complete"; render();
}
function bumpStreak(){ const t=todayStr();
  if(S.last!==t){ const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    S.streak=(S.last===y)?S.streak+1:1; S.last=t; } }
const PRAISE=["Baagundi! (nice)","Adhurs! (awesome)","Super!","Correct!","Keka! (great)","Sehbaash! (well done)"];

/* ---------- 5b. SPEAKING PRACTICE (self-rated; optional on-device record) ----------
   No speech is ever uploaded. Self-rating needs no mic and works offline.
   "Hear yourself" records locally via MediaRecorder and plays it back so you can
   compare against the native audio — the recording never leaves the device. */
function mediaOK(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder); }
let mediaRec=null, mediaStream=null, recChunks=[], recTimer=null;
function cleanupStream(){ if(mediaStream){ try{ mediaStream.getTracks().forEach(t=>t.stop()); }catch(e){} mediaStream=null; } }
function stopRec(){ if(recTimer){ clearTimeout(recTimer); recTimer=null; }
  try{ if(mediaRec && mediaRec.state!=="inactive") mediaRec.stop(); }catch(e){} }
function cleanupRec(q){ stopRec(); cleanupStream();
  if(q && q.recUrl){ try{ URL.revokeObjectURL(q.recUrl); }catch(e){} q.recUrl=null; } if(q){ q._rec=false; } }
async function toggleRec(){
  const q=S.lesson&&S.lesson.queue[0]; if(!q) return;
  if(q._rec){ stopRec(); return; }
  if(!mediaOK()){ q._recErr="Recording isn't supported in this browser."; renderLesson(); return; }
  try{ mediaStream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ q._recErr="Mic access is needed to record — you can still self-rate without it."; renderLesson(); return; }
  try{ mediaRec=new MediaRecorder(mediaStream); }
  catch(e){ q._recErr="Recording isn't supported in this browser."; cleanupStream(); renderLesson(); return; }
  recChunks=[]; q._recErr=null;
  mediaRec.ondataavailable=e=>{ if(e.data&&e.data.size) recChunks.push(e.data); };
  mediaRec.onstop=()=>{ const blob=new Blob(recChunks,{type:(mediaRec&&mediaRec.mimeType)||"audio/webm"});
    if(q.recUrl){ try{ URL.revokeObjectURL(q.recUrl); }catch(e){} }
    q.recUrl=URL.createObjectURL(blob); q._rec=false; cleanupStream(); renderLesson(); };
  q._rec=true; try{ mediaRec.start(); }catch(e){ q._rec=false; cleanupStream(); }
  renderLesson();
  recTimer=setTimeout(()=>{ if(q._rec) stopRec(); }, 8000); // safety auto-stop
}
function playRec(){ const q=S.lesson&&S.lesson.queue[0];
  if(q&&q.recUrl){ try{ new Audio(q.recUrl).play().catch(()=>{}); }catch(e){} } }
function rateSpeak(ok){
  const L=S.lesson, q=L&&L.queue[0]; if(!q) return;
  setSpoke(); srsUpdate(q.it.rm, ok); L.done++;
  if(ok){ L.combo++; L.bestCombo=Math.max(L.bestCombo,L.combo); sfx("right"); buzz(15); }
  else { L.combo=0; }
  cleanupRec(q);
  L.correct=true; nextQ(); // speak is a practice rep — it always advances, never costs a heart
}

/* ---------- 6. CONVERSATION PARTNER (your Groq key) ---------- */
const SCENARIOS={
  gf:{label:"Chat with her",sys:"You are role-playing as the learner's warm, playful Telugu girlfriend having a casual chat. Use casual 'nuvvu' speech."},
  parents:{label:"Meet the parents",sys:"You are role-playing as the respectful Telugu parent of the learner's girlfriend, meeting him for the first time. Use polite 'meeru' speech and be warm but a little formal."},
  errand:{label:"Daily errand",sys:"You are role-playing a friendly Telugu shopkeeper / auto driver in an everyday daily-life situation."}
};
function chatSystem(){ const sc=SCENARIOS[S.chat.scenario];
  return `${sc.sys} The learner is a beginner learning SPOKEN Telugu and CANNOT read Telugu script. Always reply ONLY in romanized Telugu (Latin letters), then put the English meaning in parentheses. Keep every reply to 1-2 short, simple sentences. If the learner makes a mistake, gently model the correct phrase. Never use Telugu script. Stay fully in character.`; }
async function sendChat(text){
  const key=lsGet("groqKey");
  if(!key){ S.tab="me"; S.screen="home"; render(); return; }
  S.chat.msgs.push({role:"user",content:text}); S.chat.busy=true; render();
  try{
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({ model:"llama-3.3-70b-versatile", temperature:0.7, max_tokens:200,
        messages:[{role:"system",content:chatSystem()}, ...S.chat.msgs.map(m=>({role:m.role,content:m.content}))] })
    });
    if(!r.ok){ const t=await r.text(); throw new Error(r.status+" "+t.slice(0,120)); }
    const d=await r.json();
    S.chat.msgs.push({role:"assistant",content:(d.choices?.[0]?.message?.content||"...").trim()});
  }catch(e){
    S.chat.msgs.push({role:"system",content:"Couldn't reach Groq ("+e.message+"). Check your key in Settings, or your network/CORS if self-hosting."});
  }
  S.chat.busy=false; render();
}

function renderLesson(){
  const L=S.lesson,q=L.queue[0]; let body="",footer="";

  if(q.type==="listen"){
    body=`<div class="q"><p class="prompt">Tap play, then choose the meaning</p>
      <div style="text-align:center"><button class="speaker big" data-say="${esc(q.it.te)}">🔊</button>
      <div style="margin-top:10px"><button class="speaker slow" data-slow="${esc(q.it.te)}">🐢 slow</button></div></div>
      <div class="options">${q.options.map(o=>`<button class="opt" data-pick="${esc(o)}" data-ans="${esc(q.it.en)}">${esc(o)}</button>`).join("")}</div></div>`;
    setTimeout(()=>speak(q.it.te),250);

  } else if(q.type==="recall"){
    body=`<div class="q"><p class="prompt">How do you say: <em>${esc(q.it.en)}</em></p>
      <div class="options">${q.options.map(o=>`<button class="opt" data-pick="${esc(o.rm)}" data-ans="${esc(q.it.rm)}" data-say="${esc(o.te)}">
        ${esc(o.rm)}${S.showScript?`<span class="sub" style="font-family:var(--tel)">${o.te}</span>`:""}</button>`).join("")}</div></div>`;

  } else if(q.type==="build" || q.type==="hearbuild"){
    if(!q.tiles){ const distractors=shuffle(WORDS.filter(w=>!q.answer.map(norm).includes(norm(w)))).slice(0, q.answer.length<=2?3:2);
      q.tiles=shuffle([...q.answer,...distractors]).map((w,i)=>({w,id:i})); q.built=[]; }
    const isHear=q.type==="hearbuild";
    const prompt=isHear?`Tap what you hear`:`Build: <em>${esc(q.it.en)}</em>`;
    const playhead=isHear?`<div style="text-align:center;margin:4px 0 14px"><button class="speaker big" data-say="${esc(q.it.te)}">🔊</button>
        <div style="margin-top:10px"><button class="speaker slow" data-slow="${esc(q.it.te)}">🐢 slow</button></div></div>`:"";
    const builtIds=new Set(q.built);

        return `<button class="tile placed ${L.checked?'lock':''}" data-built="${id}">${esc(t.w)}</button>`;}).join("")}</div>
      <div class="bank">${q.tiles.map(t=>`<button class="tile ${builtIds.has(t.id)?'used':''} ${L.checked?'lock':''}" data-tile="${t.id}">${esc(t.w)}</button>`).join("")}</div></div>`;
    if(isHear) setTimeout(()=>speak(q.it.te),250);

  } else if(q.type==="match"){
    if(!q.mstate){ q.mstate={ left:shuffle(q.items.map((it,i)=>({i,it}))), right:shuffle(q.items.map((it,i)=>({i,it}))),
      sel:null, matched:new Set(), wrong:null, done:false }; }
    const m=q.mstate;
    body=`<div class="q"><p class="prompt">Match the pairs</p>
      <div class="matchgrid">
        ${m.left.map(c=>`<button class="mcell ${m.matched.has(c.i)?'gone':''} ${m.sel==='L'+c.i?'sel':''} ${m.wrong==='L'+c.i?'bad':''}"
            data-mcell="L${c.i}" data-say="${esc(c.it.te)}">${esc(c.it.rm)}</button>`).join("")}
        ${m.right.map(c=>`<button class="mcell tel ${m.matched.has(c.i)?'gone':''} ${m.sel==='R'+c.i?'sel':''} ${m.wrong==='R'+c.i?'bad':''}"
            data-mcell="R${c.i}">${esc(c.it.en)}</button>`).join("")}
      </div></div>`;

  } else if(q.type==="speak"){

      <button class="btn ${ok?'':'red'}" data-act="next">Continue</button></div>`;
  }
  $("app").innerHTML=body+footer;
}

function renderComplete(){
  const L=S.lesson, total=L.total, acc=Math.round(L.done/(L.done+L.miss||1)*100);
  const crowns = L.review?null:`<div class="pill crown"><div class="k">${"👑".repeat(L.crownNow)||"—"}</div><div class="v">Level ${L.crownNow}</div></div>`;
  const crownStrip = L.review?"":`<div class="crownrow">${[1,2,3,4,5].map(i=>`<span class="${i<=L.crownNow?'on':''}">👑</span>`).join("")}</div>`;
  $("app").innerHTML=`<div class="center-screen"><div class="emoji">${L.review?"🔁":"🎉"}</div>
    <h2>${L.review?"Review done!":"Lesson done!"}</h2><p>${esc(L.lesson.unit.title)} · ${esc(L.lesson.name)}</p>
    ${crownStrip}
    <div class="pills">
      <div class="pill xp"><div class="k">+${L.earned}</div><div class="v">XP</div></div>
      <div class="pill acc"><div class="k">${isFinite(acc)?acc:100}%</div><div class="v">Accuracy</div></div>
      ${crowns||""}
      <div class="pill"><div class="k">🔥${S.streak}</div><div class="v">Streak</div></div></div>
    ${L.bestCombo>=3?`<p style="color:var(--marigold-deep);font-weight:800;margin-top:-10px">Best combo: ${L.bestCombo} 🔥</p>`:""}
    <button class="btn" data-act="home">Continue</button></div>`;
}
function renderFail(){
  $("app").innerHTML=`<div class="center-screen"><div class="emoji">💔</div>
    <h2>Out of hearts</h2><p>No stress — repetition is how it sticks.</p>
    <button class="btn marigold" data-act="retry">Try again</button><div style="height:12px"></div>
    <button class="btn ghost" data-act="home">Back home</button></div>`;
}

function renderBook(){
  const qy=norm(S.search);
  let h=`<div class="ph-head">Phrasebook</div><p class="ph-sub">Every phrase with audio. Tap 🔊 to hear it.</p>
    <div class="searchbar"><span>🔍</span><input id="search" placeholder="Search phrases or meaning…" value="${esc(S.search)}"/></div>`;
  let any=false;
  UNITS.forEach(u=>{
    const items=u.lessons.flatMap(l=>l.items).filter(it=>!qy||norm(it.rm).includes(qy)||norm(it.en).includes(qy)||it.te.includes(S.search));
    if(!items.length) return; any=true;
    h+=`<div class="ph-unit" style="color:${u.accent}">${u.title}</div>`;
    items.forEach(it=>{ const st=(S.srs[it.rm]||{}).s||0;
      h+=`<div class="ph-item"><button class="play" data-say="${esc(it.te)}">🔊</button>
        <div class="txt"><div class="rm">${esc(it.rm)}</div>${S.showScript?`<div class="tel">${it.te}</div>`:""}
          <div>${[1,2,3,4,5].map(i=>`<span class="strength ${i<=st?'on':''}"></span>`).join("")}</div></div>
        <div class="en">${esc(it.en)}</div></div>`; });
  });
  if(!any) h+=`<p class="ph-sub" style="text-align:center;margin-top:30px">No matches for "${esc(S.search)}"</p>`;
  $("app").innerHTML=h;
  const si=$("search"); if(si){ si.oninput=e=>{ S.search=e.target.value; renderBook(); const n=$("search");
    if(n){ n.focus(); n.setSelectionRange(n.value.length,n.value.length); } }; }
}

function renderChat(){
  const hasKey=!!lsGet("groqKey");
  let msgs = S.chat.msgs.map(m=>{
    if(m.role==="system") return `<div class="bubble sys">${esc(m.content)}</div>`;
    if(m.role==="user") return `<div class="bubble me">${esc(m.content)}</div>`;
    return `<div class="bubble them">${esc(m.content)}<button class="play" data-say="${esc(m.content.replace(/\(.*?\)/g,''))}">🔊</button></div>`;
  }).join("");
  if(!S.chat.msgs.length) msgs=`<div class="bubble sys">${hasKey?"Say hi to start — type or use 🎤, in English or romanized Telugu.":"Add your free Groq key in the You tab to start practicing real conversations."}</div>`;
  if(S.chat.busy) msgs+=`<div class="bubble them">…</div>`;
  const sc=Object.entries(SCENARIOS).map(([k,v])=>`<button class="${S.chat.scenario===k?'on':''}" data-scen="${k}">${v.label}</button>`).join("");
  $("app").innerHTML=`<div class="chat-wrap">
    <div class="scenario">${sc}</div>
    <div class="msgs" id="msgs">${msgs}</div>
    <div class="composer">
      <input id="chatin" placeholder="${hasKey?'Type your reply…':'Add Groq key first →'}" ${hasKey?'':'disabled'} />
      ${recog&&hasKey?`<button class="micbtn ${S.chat.live?'live':''}" data-act="chatmic">🎤</button>`:""}
      <button class="send" data-act="send" ${hasKey?'':'disabled'}>➤</button></div></div>`;
  const m=$("msgs"); if(m) m.scrollTop=m.scrollHeight;
}

function renderMe(){
  const total=ORDER.length, done=Object.keys(S.crowns).length, key=lsGet("groqKey")||"", seen=Object.keys(S.seen).length;
  $("app").innerHTML=`<div class="ph-head">You</div>
    <div class="prof-card">
      <div class="prof-row"><span>🔥 Day streak</span><span class="v">${S.streak}</span></div>
      <div class="prof-row"><span>⭐ Total XP</span><span class="v">${S.xp}</span></div>
      <div class="prof-row"><span>✓ Lessons started</span><span class="v">${done} / ${total}</span></div>
      <div class="prof-row"><span>📚 Phrases practiced</span><span class="v">${seen}</span></div>
    </div>

    <div class="ph-unit" style="margin-top:22px">Achievements</div>
    <div class="achgrid">${ACH.map(a=>`<div class="ach ${S.ach[a.id]?'on':''}"><div class="ai">${a.ic}</div><div class="at">${a.t}</div></div>`).join("")}</div>

    <div class="prof-card">
      <div class="prof-row"><span>🎯 Daily goal</span>
        <span class="stepper"><button data-act="goaldown">−</button><span class="v">${S.goal} XP</span><button data-act="goalup">+</button></span></div>
      <div class="prof-row"><span>🔊 Sound &amp; haptics</span>
        <button class="toggle ${S.sound?'on':''}" data-act="togglesound" aria-label="Toggle sound"><i></i></button></div>
      <div class="prof-row"><span>Show Telugu script<br><span style="font-weight:500;color:var(--ink-soft);font-size:12px">Optional reference — off by default</span></span>
        <button class="toggle ${S.showScript?'on':''}" data-act="togglescript" aria-label="Toggle script"><i></i></button></div>
    </div>

    <div class="prof-card">
      <div class="prof-row" style="border:none;padding-bottom:4px"><span>💬 Conversation partner</span></div>
      <div style="font-size:13px;color:var(--ink-soft);font-weight:500;line-height:1.5">Paste a free Groq API key (<a href="https://console.groq.com" target="_blank" rel="noopener">console.groq.com</a> — no card needed) to chat in the Practice tab.</div>
      <div class="keyfield"><input id="groqin" type="password" placeholder="gsk_..." value="${esc(key)}" />
        <button data-act="savekey">Save</button></div>
    </div>
    <p class="note"><b>Audio:</b> uses your device's built-in Telugu voice. Phones usually have one; some laptops don't, so audio may be silent there.<br><br>
    <b>Speaking practice:</b> the 🎤 uses your browser's speech recognition${recog?"":" — not available in this browser, so speaking falls back to self-check"}. It works best in Chrome on Android.<br><br>
    <b>Speak for real:</b> these drills are your daily warm-up — using the phrases with your girlfriend and getting corrected by a native speaker is what builds true confidence.</p>
    <a class="linkbtn" data-act="reset">Reset all progress</a>`;
}

function render(){
  renderBar(); renderNav();
  if(S.screen==="lesson") return renderLesson();
  if(S.screen==="complete") return renderComplete();
  if(S.screen==="fail") return renderFail();
  if(S.tab==="learn") return renderHome();
  if(S.tab==="book") return renderBook();
  if(S.tab==="chat") return renderChat();
  return renderMe();
}

/* ---------- 8. EVENTS ---------- */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-say],[data-slow],[data-tab],[data-lesson],[data-act],[data-pick],[data-scen],[data-tile],[data-built],[data-mcell]");
  if(!t) return;
  if(t.dataset.slow!=null){ speak(t.dataset.slow,.5); return; }
  if(t.dataset.say!=null){ speak(t.dataset.say); if(t.dataset.mcell==null && !t.closest(".opt")) return; }
  if(t.dataset.tab){ S.tab=t.dataset.tab; S.screen="home"; render(); return; }
  if(t.dataset.scen){ S.chat.scenario=t.dataset.scen; S.chat.msgs=[]; render(); return; }
  if(t.dataset.lesson){ startLesson(t.dataset.lesson); return; }

  /* multiple choice */
  if(t.dataset.pick!=null && S.lesson && !S.lesson.checked){
    document.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
    t.classList.add("sel"); S.lesson.sel={pick:t.dataset.pick,ans:t.dataset.ans,it:curItem()};
    const cb=$("checkbtn"); if(cb) cb.disabled=false; sfx("tap"); return;
  }
  /* build: add a tile */
  if(t.dataset.tile!=null && S.lesson && !S.lesson.checked){
    const q=S.lesson.queue[0], id=+t.dataset.tile;
    if(!q.built.includes(id)){ q.built.push(id); sfx("tap"); renderLesson(); } return;
  }
  /* build: remove a placed tile */
  if(t.dataset.built!=null && S.lesson && !S.lesson.checked){
    const q=S.lesson.queue[0], id=+t.dataset.built;
    q.built=q.built.filter(x=>x!==id); renderLesson(); return;
  }
  /* match */
  if(t.dataset.mcell!=null && S.lesson){
    handleMatch(t.dataset.mcell); return;
  }

  const a=t.dataset.act;
  if(a==="quit"){ S.screen="home"; S.tab="learn"; render(); }
  else if(a==="review"){ startReview(); }
  else if(a==="check"){ doCheck(); }
  else if(a==="saidspeak"){ const q=S.lesson.queue[0]; S.lesson.correct=true; S.lesson.checked=true;
    S.lesson.done++; srsUpdate(q.it.rm,true); render(); }
  else if(a==="mic"){ doMic(t); }
  else if(a==="next"){ nextQ(); }
  else if(a==="retry"){ S.lesson.review?startReview():startLesson(S.lesson.lesson.id); }
  else if(a==="home"){ S.screen="home"; S.tab="learn"; render(); }
  else if(a==="togglescript"){ S.showScript=!S.showScript; lsSet("showScript",S.showScript?"1":"0"); render(); }
  else if(a==="togglesound"){ S.sound=!S.sound; lsSet("sound",S.sound?"1":"0"); if(S.sound)sfx("tap"); render(); }
  else if(a==="goalup"){ S.goal=Math.min(100,S.goal+10); lsSet("goal",S.goal); render(); }
  else if(a==="goaldown"){ S.goal=Math.max(10,S.goal-10); lsSet("goal",S.goal); render(); }
  else if(a==="savekey"){ const v=$("groqin").value.trim(); if(v)lsSet("groqKey",v); else lsDel("groqKey");
    t.textContent="Saved ✓"; setTimeout(()=>render(),700); }
  else if(a==="reset"){ if(confirm("Reset all XP, streak, crowns and progress?")) resetProgress(); }
  else if(a==="send"){ doSend(); }
  else if(a==="chatmic"){ doChatMic(); }
});
document.addEventListener("keydown",e=>{ if(e.key==="Enter"&&e.target.id==="chatin"){ e.preventDefault(); doSend(); } });

function curItem(){ const q=S.lesson&&S.lesson.queue[0]; return q?q.it:null; }
function doSend(){ const i=$("chatin"); if(!i)return; const v=i.value.trim(); if(!v||S.chat.busy)return; i.value=""; sendChat(v); }

function doCheck(){
  const L=S.lesson, q=L.queue[0];
  if(q.type==="build"||q.type==="hearbuild"){
    const builtStr=q.built.map(id=>q.tiles.find(x=>x.id===id).w).map(norm).join(" ");
    const ans=q.answer.map(norm).join(" ");
    const ok=builtStr===ans;
    document.querySelectorAll(".answerbox .tile").forEach(el=>el.classList.add("lock"));
    grade(ok,q.it); return;
  }
  if(!L.sel)return; const ok=L.sel.pick===L.sel.ans;
  document.querySelectorAll(".opt").forEach(o=>{ if(o.dataset.pick===L.sel.ans)o.classList.add("right");
    if(o.classList.contains("sel")&&!ok)o.classList.add("wrong"); o.style.pointerEvents="none"; });
  grade(ok, q.it);
}

function handleMatch(cell){
  const L=S.lesson, q=L.queue[0], m=q.mstate; if(m.done)return;
  const side=cell[0], idx=+cell.slice(1);
  if(m.matched.has(idx)) return;
  speak(q.items[idx].te);
  if(!m.sel){ m.sel=cell; sfx("tap"); renderLesson(); return; }
  if(m.sel===cell){ m.sel=null; renderLesson(); return; }
  const s1=m.sel[0], i1=+m.sel.slice(1);
  if(s1!==side && i1===idx){ // correct pair (one left, one right, same item)
    m.matched.add(idx); m.sel=null; sfx("right"); buzz(15);
    srsUpdate(q.items[idx].rm,true);
    if(m.matched.size===q.items.length){ m.done=true; L.done++; }
    renderLesson();
  } else {
    m.wrong=cell; const bad=m.sel; sfx("wrong"); buzz(30);
    srsUpdate(q.items[idx].rm,false); if(i1!==idx) srsUpdate(q.items[i1].rm,false);
    renderLesson();
    setTimeout(()=>{ m.wrong=null; m.sel=null; if(S.screen==="lesson"&&S.lesson&&S.lesson.queue[0]===q) renderLesson(); },550);
  }
}

function doMic(btn){
  const q=S.lesson.queue[0]; if(q._live)return; q._live=true; renderLesson();
  listenOnce(q.it.te, res=>{
    q._live=false;
    if(res.unsupported){ q.heard="Speech input not supported — tap Skip."; renderLesson(); return; }
    if(res.error){ q.heard = res.error==="not-allowed" ? "Mic permission needed." : "Didn't catch that — try again."; renderLesson(); return; }
    q.heard = `You said: <b>${esc(res.heard)}</b>`;
    const ok=res.score>=0.55; q.score=res.score;
    setSpoke();
    grade(ok,q.it);
  });
}

/* chat mic: dictate Telugu into the composer (separate from lesson scoring) */
function doChatMic(){
  if(!recog || S.chat.live) return;
  S.chat.live=true; renderChat();
  let r=new recog(); r.lang="te-IN"; r.interimResults=false; r.maxAlternatives=1;
  r.onresult=e=>{ const txt=e.results[0][0].transcript; const i=$("chatin"); if(i){ i.value=(i.value?i.value+" ":"")+txt; } };
  r.onend=()=>{ S.chat.live=false; renderChat(); const i=$("chatin"); if(i) i.focus(); };
  r.onerror=()=>{ S.chat.live=false; renderChat(); };
  try{ r.start(); }catch(e){ S.chat.live=false; renderChat(); }
}

/* ---------- 9. PWA (only activates when served over http/https) ---------- */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(()=>{}));
}

/* ---------- 10. BOOT ---------- */
render();
</script>
